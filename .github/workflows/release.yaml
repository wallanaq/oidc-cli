name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build CLI binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH={{ matrix.goarch }} \
          go build -ldflags="-s -w -X github.com/wallanaq/oidc-cli/cmd/version.current=${{ github.ref_name }}" \
          -o dist/oidc-cli-${{ matrix.goos }}-{{ matrix.goarch }}.

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: oidc-cli-${{ matrix.goos }}-{{ matrix.goarch }}
          path: dist/oidc-cli-*

      # - name: Archive binary
      #   run: |
      #     cd dist
      #     tar -czvf oidc-cli-${{ matrix.goos }}-{{ matrix.goarch }}.tar.gz oidc-cli-*

